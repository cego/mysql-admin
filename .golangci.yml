linters:
  enable:
    - errcheck       # unchecked errors
    - gosimple       # code simplifications
    - govet          # go vet checks
    - ineffassign    # unused assignments
    - staticcheck    # comprehensive static analysis
    - unused         # unused code
    - misspell       # spelling mistakes in comments/strings
    - unconvert      # unnecessary type conversions
    - gofmt          # formatting
    - goimports      # import ordering

linters-settings:
  goimports:
    local-prefixes: github.com/cego/mysql-admin

issues:
  exclude-rules:
    # Errcheck is noisy for deferred Close calls
    - linters: [errcheck]
      text: "Error return value of .*(Close|Write|Flush)"
